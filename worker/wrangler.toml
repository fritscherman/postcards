# Cloudflare Worker config for the Postcards API.
# Quick start (see worker/README.md for details):
#   1. npm install            (inside worker/)
#   2. npx wrangler login
#   3. npm run db:create      -> copy the printed database_id below
#   4. npm run db:migrate     (and db:migrate:local for local dev)
#   5. npx wrangler secret put JWT_SECRET
#   6. npm run deploy
name = "postcards-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"

[[d1_databases]]
binding = "DB"
database_name = "postcards"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[vars]
# Comma-separated list of allowed origins, or "*" while testing.
ALLOWED_ORIGIN = "*"
# Optional: the public base URL of the frontend, used to build invite links.
APP_URL = "https://fritscherman.github.io/postcards"
# Optional email sending — set RESEND_API_KEY as a secret to enable.
INVITE_FROM = "Postkarten <onboarding@resend.dev>"
